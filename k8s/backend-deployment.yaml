apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasktracker-backend
  namespace: tasktracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tasktracker-backend
  template:
    metadata:
      labels:
        app: tasktracker-backend
    spec:
      containers:
        - name: backend
          image: ankitaubale/tasktracker-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            # ── Non-sensitive from ConfigMap ──────────────────
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: tasktracker-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: tasktracker-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: tasktracker-config
                  key: DB_NAME
            # ── Sensitive from Secret ─────────────────────────
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password
          # ── Resource limits ───────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # ── Readiness probe ───────────────────────────────
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          # ── Liveness probe ────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
