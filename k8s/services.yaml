apiVersion: v1
kind: Service
metadata:
  name: tasktracker-backend-svc
spec:
  type: NodePort
  selector:
    app: tasktracker-backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: tasktracker-frontend-svc
spec:
  type: NodePort
  selector:
    app: tasktracker-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
