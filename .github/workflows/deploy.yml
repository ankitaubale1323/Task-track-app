name: TaskTracker CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Login to DockerHub ─────────────────────────────
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 3. Build & Push Backend ───────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ankitaubale/tasktracker-backend:latest
            ankitaubale/tasktracker-backend:${{ github.sha }}

      # ── 4. Build & Push Frontend ──────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ankitaubale/tasktracker-frontend:latest
            ankitaubale/tasktracker-frontend:${{ github.sha }}

      # ── 5. Deploy to EC2 via SSH → kubectl apply ──────────
      - name: Deploy to EC2 kind cluster
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/tasktracker

            # Update image tag to this commit SHA
            sed -i "s|ankitaubale/tasktracker-backend:.*|ankitaubale/tasktracker-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
            sed -i "s|ankitaubale/tasktracker-frontend:.*|ankitaubale/tasktracker-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml

            # Apply all manifests
            kubectl apply -f k8s/secret.yaml
            kubectl apply -f k8s/configmap.yaml
            kubectl apply -f k8s/pvc.yaml
            kubectl apply -f k8s/mysql-statefulset.yaml
            kubectl apply -f k8s/backend-deployment.yaml
            kubectl apply -f k8s/frontend-deployment.yaml
            kubectl apply -f k8s/services.yaml
            kubectl apply -f k8s/hpa.yaml

            # Verify rollout
            kubectl rollout status deployment/tasktracker-backend
            kubectl rollout status deployment/tasktracker-frontend
            kubectl get pods
